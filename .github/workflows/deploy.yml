name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Preview mode: when the repo variable PAGES_BASE is set (e.g. "/forest-spa-massage"),
      # build for the github.io project URL and drop the custom-domain CNAME, so the live
      # forestspamassage.com (still on Wix) is left untouched. Unset PAGES_BASE for the
      # production cutover to the custom domain at the web root.
      - name: Preview mode — drop custom domain
        if: ${{ vars.PAGES_BASE != '' }}
        run: rm -f public/CNAME

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Resilient install: withastro/action's bundled `npm ci` intermittently
      # under-installs (npm "Exit handler never called!" bug) and leaves the astro
      # binary missing. Verify it, and fall back to a clean install if needed.
      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || true
          if [ ! -x node_modules/.bin/astro ]; then
            echo "astro binary missing after npm ci — doing a clean npm install"
            rm -rf node_modules
            npm install --no-audit --no-fund
          fi

      - name: Build
        run: npm run build
        env:
          # Optional — set these as repository secrets to enable analytics.
          # (When unset, the GA4 / Google Ads / Meta Pixel tags don't render.)
          PUBLIC_GA4_ID: ${{ secrets.PUBLIC_GA4_ID }}
          PUBLIC_META_PIXEL_ID: ${{ secrets.PUBLIC_META_PIXEL_ID }}
          PUBLIC_GOOGLE_ADS_ID: ${{ secrets.PUBLIC_GOOGLE_ADS_ID }}
          PUBLIC_GOOGLE_ADS_BOOKING_LABEL: ${{ secrets.PUBLIC_GOOGLE_ADS_BOOKING_LABEL }}
          # Domain is env-driven. PAGES_BASE set → github.io project preview; unset → custom domain.
          SITE_URL: ${{ vars.PAGES_BASE != '' && 'https://augustinursus.github.io' || 'https://www.forestspamassage.com' }}
          BASE_PATH: ${{ vars.PAGES_BASE != '' && vars.PAGES_BASE || '/' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
